<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Note - NoteForge</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container py-5">
    <div class="card p-4 mx-auto" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 th:text="${note.title}">Note Title</h2>
            <span th:if="${note.favorite}" class="favorite-badge">★ Favorite</span>
        </div>

        <p class="text-muted">
            Category: <strong th:text="${note.category}">General</strong>
        </p>

        <hr>

        <div class="mb-4" style="white-space: pre-wrap;" th:text="${note.content}"></div>

        <p class="text-muted">
            Created: <span th:text="${#temporals.format(note.createdAt, 'dd MMM yyyy HH:mm')}"></span><br>
            Updated: <span th:text="${#temporals.format(note.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
        </p>

        <div class="d-flex gap-2">
            <a class="btn btn-success btn-rounded" th:href="@{'/notes/edit/' + ${note.id}}">Edit</a>
            <a class="btn btn-secondary btn-rounded" th:href="@{/}">Back</a>
        </div>
    </div>
</div>

</body>
</html>
