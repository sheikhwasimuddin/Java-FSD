<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NoteForge - Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">📝 NoteForge</a>
        <div class="d-flex gap-2">
            <a class="btn btn-warning btn-rounded" th:href="@{/notes/add}">+ Add Note</a>
            <a class="btn btn-outline-light btn-rounded" th:href="@{/?filter=favorites}">Favorites</a>
            <a class="btn btn-outline-light btn-rounded" th:href="@{/}">All Notes</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h2 class="page-title">📒 Smart Notes Dashboard</h2>

        <form class="d-flex gap-2" method="get" th:action="@{/}">
            <input type="text" class="form-control" name="keyword" placeholder="Search notes..." th:value="${keyword}">
            <button type="submit" class="btn btn-primary btn-rounded">Search</button>
        </form>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="note : ${notes}">
            <div class="card note-card p-3 h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 th:text="${note.title}">Title</h5>
                    <span th:if="${note.favorite}" class="favorite-badge">★ Favorite</span>
                </div>

                <p class="text-muted mb-1">
                    Category: <span th:text="${note.category}">General</span>
                </p>

                <p class="note-content-preview" th:text="${note.content}">Content preview...</p>

                <small class="text-muted d-block mb-3">
                    Updated: <span th:text="${#temporals.format(note.updatedAt, 'dd MMM yyyy HH:mm')}"></span>
                </small>

                <div class="d-flex flex-wrap gap-2 mt-auto">
                    <a class="btn btn-sm btn-primary btn-rounded" th:href="@{'/notes/view/' + ${note.id}}">View</a>
                    <a class="btn btn-sm btn-success btn-rounded" th:href="@{'/notes/edit/' + ${note.id}}">Edit</a>
                    <a class="btn btn-sm btn-danger btn-rounded"
                       th:href="@{'/notes/delete/' + ${note.id}}"
                       onclick="return confirm('Are you sure you want to delete this note?')">Delete</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(notes)}" class="text-center mt-5">
        <h4>No notes found 😕</h4>
        <a class="btn btn-warning mt-3 btn-rounded" th:href="@{/notes/add}">Create Your First Note</a>
    </div>
</div>

</body>
</html>
