<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Note - NoteForge</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container py-5">
    <div class="card p-4 mx-auto" style="max-width: 800px;">
        <h2 class="mb-4">➕ Add New Note</h2>

        <form th:action="@{/notes/save}" th:object="${note}" method="post">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" th:field="*{title}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" th:field="*{category}" placeholder="e.g. Study, Ideas, Personal">
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea class="form-control" rows="8" th:field="*{content}" required></textarea>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{favorite}">
                <label class="form-check-label">Mark as Favorite</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success btn-rounded">Save Note</button>
                <a class="btn btn-secondary btn-rounded" th:href="@{/}">Back</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
